<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 BD Live TV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap');

:root {
  --bg: #080c10;
  --surface: #0e1420;
  --card: #141c2a;
  --card2: #1a2436;
  --accent: #00c6ff;
  --accent2: #0072ff;
  --accentg: linear-gradient(135deg,#00c6ff,#0072ff);
  --red: #e63946;
  --text: #e8edf5;
  --muted: #6b7a96;
  --border: rgba(255,255,255,0.06);
  --sidebar: 320px;
  --header: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Baloo Da 2', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  height: var(--header);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 20;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  background: var(--accentg);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex-shrink: 0;
}

.live-pip {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 0 0 rgba(230,57,70,.5);
  animation: livepulse 1.6s infinite;
  flex-shrink: 0;
}

@keyframes livepulse {
  0%   { box-shadow: 0 0 0 0 rgba(230,57,70,.5); }
  70%  { box-shadow: 0 0 0 7px rgba(230,57,70,0); }
  100% { box-shadow: 0 0 0 0 rgba(230,57,70,0); }
}

.search-wrap {
  flex: 1;
  max-width: 300px;
  position: relative;
}

.search-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: .85rem;
  padding: 7px 12px 7px 34px;
  border-radius: 10px;
  outline: none;
  transition: border-color .2s;
}

.search-wrap input:focus { border-color: var(--accent); }

.search-wrap svg {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

.now-bar {
  flex: 1;
  font-size: .78rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.now-bar b { color: var(--accent); font-weight: 600; }

.src-count {
  font-size: .7rem;
  color: var(--muted);
  background: var(--card);
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  flex-shrink: 0;
  white-space: nowrap;
}

.menu-btn {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.1rem;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ── LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── PLAYER AREA ── */
.player-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #000;
  min-width: 0;
}

.welcome-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 32px;
  text-align: center;
}

.welcome-screen .w-icon { font-size: 3.5rem; }

.welcome-screen h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  background: var(--accentg);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.welcome-screen p { color: var(--muted); font-size: .9rem; max-width: 320px; line-height: 1.6; }

.loading-playlists {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.pl-progress {
  width: 220px;
  height: 4px;
  background: var(--card);
  border-radius: 4px;
  overflow: hidden;
}

.pl-bar {
  height: 100%;
  background: var(--accentg);
  border-radius: 4px;
  width: 0%;
  transition: width .4s;
}

.pl-status { font-size: .78rem; color: var(--muted); }

.video-wrapper {
  position: relative;
  background: #000;
  flex-shrink: 0;
  display: none;
}

video {
  width: 100%;
  display: block;
  background: #000;
  max-height: calc(100vh - var(--header) - 48px - 40px);
}

.v-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .75s linear infinite;
  display: none;
}

.spinner.on { display: block; }

@keyframes spin { to { transform: rotate(360deg); } }

.err-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(0,0,0,.88);
  text-align: center;
  padding: 20px;
}

.err-overlay.on { display: flex; }

.err-overlay .err-icon { font-size: 2.5rem; }

.err-overlay p { color: var(--muted); font-size: .85rem; }

.retry-wrap { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

.btn {
  font-family: inherit;
  font-size: .82rem;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: opacity .2s;
}

.btn:hover { opacity: .82; }

.btn-primary { background: var(--accentg); color: #fff; background: linear-gradient(135deg,#00c6ff,#0072ff); }
.btn-ghost { background: var(--card2); color: var(--text); border: 1px solid var(--border); }

/* INFO BAR */
.info-bar {
  height: 48px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: none;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}

.info-logo {
  width: 32px; height: 32px;
  border-radius: 6px;
  object-fit: contain;
  background: var(--card);
  padding: 2px;
  flex-shrink: 0;
}

.info-name { font-weight: 700; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.info-group {
  font-size: .7rem;
  background: var(--card2);
  padding: 2px 8px;
  border-radius: 12px;
  color: var(--muted);
  flex-shrink: 0;
}

.info-src {
  font-size: .65rem;
  color: var(--accent);
  background: rgba(0,198,255,.1);
  border: 1px solid rgba(0,198,255,.2);
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}

.live-badge {
  margin-left: auto;
  font-size: .68rem;
  font-weight: 700;
  color: var(--red);
  border: 1px solid var(--red);
  padding: 2px 7px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* URL SWITCHER */
.url-switcher {
  display: none;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.url-switcher.on { display: flex; }

.url-btn {
  font-family: inherit;
  font-size: .72rem;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.url-btn:hover { background: var(--card2); color: var(--text); }
.url-btn.active { background: rgba(0,198,255,.12); border-color: var(--accent); color: var(--accent); }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

/* TABS */
.tab-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 11px 14px;
  font-family: inherit;
  font-size: .76rem;
  font-weight: 600;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  flex-shrink: 0;
}

.tab-btn.active { color: var(--text); border-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* CHANNEL LIST */
.ch-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--card2) transparent;
}

.ch-list::-webkit-scrollbar { width: 4px; }
.ch-list::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 4px; }

.ch-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  position: relative;
}

.ch-item:hover { background: var(--card); }

.ch-item.active {
  background: rgba(0,198,255,.08);
  border-left: 3px solid var(--accent);
  padding-left: 9px;
}

.ch-logo {
  width: 38px; height: 38px;
  border-radius: 8px;
  object-fit: contain;
  background: var(--bg);
  padding: 3px;
  flex-shrink: 0;
}

.ch-info { flex: 1; min-width: 0; }

.ch-name {
  font-size: .82rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ch-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}

.ch-group { font-size: .68rem; color: var(--muted); }

.ch-urls {
  font-size: .62rem;
  background: rgba(0,198,255,.1);
  color: var(--accent);
  padding: 1px 5px;
  border-radius: 8px;
  flex-shrink: 0;
}

.play-arrow {
  color: var(--accent);
  opacity: 0;
  font-size: .9rem;
  flex-shrink: 0;
  transition: opacity .15s;
}

.ch-item:hover .play-arrow,
.ch-item.active .play-arrow { opacity: 1; }

.empty-msg {
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
  font-size: .85rem;
}

/* LOADING SKELETON */
.skeleton-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
}

.sk-circle {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--card);
  flex-shrink: 0;
  animation: shimmer 1.2s infinite;
}

.sk-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }

.sk-line {
  height: 10px;
  border-radius: 4px;
  background: var(--card);
  animation: shimmer 1.2s infinite;
}

.sk-line.short { width: 55%; }

@keyframes shimmer {
  0%,100% { opacity: .4; }
  50% { opacity: .7; }
}

/* SOURCE LEGEND */
.source-legend {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  flex-shrink: 0;
}

.src-dot {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: .65rem;
  color: var(--muted);
}

.src-dot span {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.src-0 { background: #00c6ff; }
.src-1 { background: #a855f7; }
.src-2 { background: #f59e0b; }

/* MOBILE */
@media (max-width: 700px) {
  :root { --sidebar: 100vw; }

  .sidebar {
    position: fixed;
    right: 0; top: var(--header); bottom: 0;
    transform: translateX(100%);
    transition: transform .3s ease;
    z-index: 100;
    border-left: none;
  }

  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: flex; }
  .now-bar { display: none; }
  .src-count { display: none; }
  .search-wrap { max-width: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="live-pip"></div>
    BD Live TV
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="চ্যানেল খুঁজুন..." autocomplete="off">
  </div>
  <div class="now-bar" id="nowBar">চ্যানেল লোড হচ্ছে…</div>
  <div class="src-count" id="srcCount">লোড হচ্ছে…</div>
  <button class="menu-btn" id="menuBtn">☰</button>
</header>

<div class="main">

  <!-- PLAYER -->
  <div class="player-area">

    <div class="welcome-screen" id="welcomeScreen">
      <div class="w-icon">📺</div>
      <h2>BD Live TV</h2>
      <div class="loading-playlists" id="loadingPlaylists">
        <div class="pl-progress"><div class="pl-bar" id="plBar"></div></div>
        <div class="pl-status" id="plStatus">playlist লোড হচ্ছে…</div>
      </div>
      <p id="welcomeMsg" style="display:none">পাশের তালিকা থেকে পছন্দের চ্যানেল বেছে নিন<br>৩টি সোর্স থেকে সর্বমোট <b id="totalCount">0</b>টি চ্যানেল পাওয়া গেছে</p>
    </div>

    <div class="video-wrapper" id="videoWrapper">
      <video id="vid" controls autoplay playsinline></video>
      <div class="v-overlay">
        <div class="spinner" id="spinner"></div>
      </div>
      <div class="err-overlay" id="errOverlay">
        <div class="err-icon">⚠️</div>
        <strong>স্ট্রিম চলছে না</strong>
        <p id="errMsg">এই URL-এ সমস্যা হচ্ছে।</p>
        <div class="retry-wrap">
          <button class="btn btn-primary" onclick="retryNext()">পরের URL চেষ্টা করুন</button>
          <button class="btn btn-ghost" onclick="retryCurrent()">আবার চেষ্টা</button>
        </div>
      </div>
    </div>

    <div class="info-bar" id="infoBar">
      <img class="info-logo" id="infoLogo" src="" alt="">
      <div class="info-name" id="infoName"></div>
      <div class="info-group" id="infoGroup"></div>
      <div class="info-src" id="infoSrc"></div>
      <div class="live-badge"><span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block"></span> LIVE</div>
    </div>

    <div class="url-switcher" id="urlSwitcher"></div>

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="source-legend">
      <div class="src-dot"><span class="src-0"></span> Shajon</div>
      <div class="src-dot"><span class="src-1"></span> MrGify</div>
      <div class="src-dot"><span class="src-2"></span> Shadman</div>
    </div>

    <div class="tab-bar" id="tabBar"></div>
    <div class="ch-list" id="chList">
      <!-- skeletons -->
      ${Array(12).fill(0).map(()=>`<div class="skeleton-item"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div></div>`).join('')}
    </div>
  </div>

</div>

<script>
// ─── SOURCES ──────────────────────────────────────────────────────────────────
const SOURCES = [
  {
    name: 'Shajon',
    color: '#00c6ff',
    url: 'https://raw.githubusercontent.com/DrSujonPaul/Sujon/6dc6a1d4eaa20a9239ae27d8e0f00182b60eeb47/iptv'
  },
  {
    name: 'MrGify',
    color: '#a855f7',
    url: 'https://raw.githubusercontent.com/abusaeeidx/Mrgify-BDIX-IPTV/main/playlist.m3u'
  },
  {
    name: 'Shadman',
    color: '#f59e0b',
    url: 'https://raw.githubusercontent.com/Shadmanislam/bdiptv/master/BD%20IPTV.m3u'
  }
];

const PROXY = 'https://corsproxy.io/?url=';

// ─── M3U PARSER ───────────────────────────────────────────────────────────────
function parseM3U(text, sourceName) {
  const lines = text.replace(/\r/g,'').split('\n');
  const channels = [];
  let cur = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || line === '#EXTM3U') continue;

    if (line.startsWith('#EXTINF:')) {
      const logoM  = line.match(/tvg-logo="([^"]*)"/);
      const groupM = line.match(/group-title="([^"]*)"/);
      const nameM  = line.match(/,(.+)$/);
      if (!nameM) continue;

      const name  = nameM[1].trim();
      const logo  = logoM ? logoM[1] : '';
      const group = groupM ? groupM[2] || groupM[1] : 'Other';

      cur = { name, logo, group, urls: [], source: sourceName };
    } else if (cur && !line.startsWith('#') && (line.startsWith('http') || line.startsWith('rtmp'))) {
      cur.urls.push(line);
      channels.push({ ...cur, urls: [...cur.urls] });
      cur = null;
    } else if (line.startsWith('#')) {
      // skip VLC opts etc
    }
  }
  return channels;
}

// ─── MERGE: deduplicate by name + add multi-url ────────────────────────────
function mergeChannels(allRaw) {
  const map = new Map();
  for (const ch of allRaw) {
    const key = ch.name.toLowerCase().replace(/\s+/g,' ').trim();
    if (map.has(key)) {
      const existing = map.get(key);
      for (const u of ch.urls) {
        if (!existing.urls.includes(u)) existing.urls.push(u);
      }
      if (!existing.logo && ch.logo) existing.logo = ch.logo;
    } else {
      map.set(key, { ...ch, urls: [...ch.urls] });
    }
  }
  return [...map.values()].filter(c => c.urls.length > 0);
}

// ─── SMART GROUP NORMALIZER ───────────────────────────────────────────────────
const GROUP_MAP = {
  'bangladesh': 'বাংলাদেশ',
  'bangla': 'বাংলাদেশ',
  'bd': 'বাংলাদেশ',
  'akash go': 'বাংলাদেশ',
  'wow': 'বাংলাদেশ',
  '[live] bdix': 'বাংলাদেশ',
  'sports': 'স্পোর্টস',
  'sport': 'স্পোর্টস',
  'indian bangla': 'ইন্ডিয়ান বাংলা',
  'india': 'ইন্ডিয়া',
  'music': 'মিউজিক',
  'kids': 'কিডস',
  'news': 'নিউজ',
  'infotainment': 'ইনফো',
  'religion': 'ধর্ম',
  'pakistan': 'পাকিস্তান',
  'others': 'অন্যান্য',
  'other': 'অন্যান্য',
  'live event': 'লাইভ ইভেন্ট',
};

function normalizeGroup(g) {
  const lower = (g || '').toLowerCase().trim();
  for (const [k, v] of Object.entries(GROUP_MAP)) {
    if (lower.includes(k)) return v;
  }
  return g || 'অন্যান্য';
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let allChannels = [];
let activeGroup = 'বাংলাদেশ';
let activeChannel = null;
let urlIndex = 0;
let hlsInst = null;

// ─── FETCH ALL PLAYLISTS ──────────────────────────────────────────────────────
async function fetchSource(src) {
  // try direct, then proxy
  try {
    const r = await fetch(src.url, { signal: AbortSignal.timeout(8000) });
    if (r.ok) return await r.text();
  } catch (e) {}
  try {
    const r = await fetch(PROXY + encodeURIComponent(src.url), { signal: AbortSignal.timeout(10000) });
    if (r.ok) return await r.text();
  } catch (e) {}
  return null;
}

async function loadAll() {
  const bar = document.getElementById('plBar');
  const status = document.getElementById('plStatus');
  const allRaw = [];
  let loaded = 0;

  for (let i = 0; i < SOURCES.length; i++) {
    const src = SOURCES[i];
    status.textContent = `${src.name} লোড হচ্ছে… (${i+1}/${SOURCES.length})`;
    bar.style.width = ((i / SOURCES.length) * 80) + '%';

    const text = await fetchSource(src);
    if (text) {
      const parsed = parseM3U(text, src.name);
      allRaw.push(...parsed);
      loaded++;
    }
  }

  bar.style.width = '100%';
  status.textContent = '';

  allChannels = mergeChannels(allRaw).map(c => ({
    ...c,
    group: normalizeGroup(c.group)
  }));

  // sort: BD first
  allChannels.sort((a,b) => {
    const order = ['বাংলাদেশ','স্পোর্টস','ইন্ডিয়ান বাংলা','ইন্ডিয়া','মিউজিক','কিডস','নিউজ','ইনফো','ধর্ম','পাকিস্তান','লাইভ ইভেন্ট','অন্যান্য'];
    return (order.indexOf(a.group)||99) - (order.indexOf(b.group)||99);
  });

  document.getElementById('totalCount').textContent = allChannels.length;
  document.getElementById('srcCount').textContent = `${allChannels.length} চ্যানেল`;
  document.getElementById('loadingPlaylists').style.display = 'none';
  document.getElementById('welcomeMsg').style.display = 'block';

  buildTabs();
  renderList();
}

// ─── BUILD TABS ───────────────────────────────────────────────────────────────
function buildTabs() {
  const groups = ['সব', ...new Set(allChannels.map(c => c.group))];
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  groups.forEach(g => {
    const cnt = g === 'সব' ? allChannels.length : allChannels.filter(c => c.group === g).length;
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (g === activeGroup ? ' active' : '');
    btn.innerHTML = `${g} <small style="opacity:.55;font-size:.68em">${cnt}</small>`;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeGroup = g;
      renderList(document.getElementById('searchInput').value);
    };
    bar.appendChild(btn);
  });
}

// ─── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList(q = '') {
  const list = document.getElementById('chList');
  const filtered = allChannels.filter(c => {
    const gm = activeGroup === 'সব' || c.group === activeGroup;
    const nm = !q || c.name.toLowerCase().includes(q.toLowerCase());
    return gm && nm;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-msg">কোনো চ্যানেল পাওয়া যায়নি</div>`;
    return;
  }

  const srcIdx = { Shajon: 0, MrGify: 1, Shadman: 2 };
  const srcColors = ['#00c6ff','#a855f7','#f59e0b'];

  list.innerHTML = '';
  filtered.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'ch-item' + (activeChannel === ch ? ' active' : '');

    const dotColor = srcColors[srcIdx[ch.source] ?? 0] ?? '#6b7a96';
    const urlBadge = ch.urls.length > 1 ? `<span class="ch-urls">${ch.urls.length} URL</span>` : '';

    div.innerHTML = `
      <img class="ch-logo" src="${ch.logo||''}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 38 38\\'><rect width=\\'38\\' height=\\'38\\' rx=\\'8\\' fill=\\'%23141c2a\\'/><text x=\\'19\\' y=\\'23\\' text-anchor=\\'middle\\' font-size=\\'16\\' fill=\\'%2300c6ff\\'>📺</text></svg>'">
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-meta">
          <span class="ch-group">${ch.group}</span>
          ${urlBadge}
          <span style="width:5px;height:5px;border-radius:50%;background:${dotColor};flex-shrink:0"></span>
        </div>
      </div>
      <span class="play-arrow">▶</span>
    `;
    div.onclick = () => play(ch);
    list.appendChild(div);
  });
}

// ─── PLAY ─────────────────────────────────────────────────────────────────────
function play(ch, idx = 0) {
  activeChannel = ch;
  urlIndex = idx;

  // Update UI
  renderList(document.getElementById('searchInput').value);
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('videoWrapper').style.display = 'block';
  document.getElementById('infoBar').style.display = 'flex';
  document.getElementById('errOverlay').classList.remove('on');
  document.getElementById('spinner').classList.add('on');

  document.getElementById('infoLogo').src = ch.logo || '';
  document.getElementById('infoName').textContent = ch.name;
  document.getElementById('infoGroup').textContent = ch.group;
  document.getElementById('infoSrc').textContent = ch.source;
  document.getElementById('nowBar').innerHTML = `▶ <b>${ch.name}</b>`;
  document.title = `📺 ${ch.name}`;

  // URL switcher
  buildUrlSwitcher(ch, idx);

  // Play
  const url = ch.urls[idx];
  loadStream(url);

  // Close sidebar on mobile
  if (window.innerWidth <= 700) document.getElementById('sidebar').classList.remove('open');
}

function buildUrlSwitcher(ch, activeIdx) {
  const sw = document.getElementById('urlSwitcher');
  if (ch.urls.length <= 1) { sw.classList.remove('on'); return; }
  sw.classList.add('on');
  sw.innerHTML = '<span style="font-size:.7rem;color:var(--muted);align-self:center">URL:</span>';
  ch.urls.forEach((u, i) => {
    const b = document.createElement('button');
    b.className = 'url-btn' + (i === activeIdx ? ' active' : '');
    b.textContent = `#${i+1}`;
    b.title = u;
    b.onclick = () => play(ch, i);
    sw.appendChild(b);
  });
}

function loadStream(url) {
  const vid = document.getElementById('vid');

  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }

  const isTS = /\.ts(\?|$)/.test(url) || /\/tracks-/.test(url);

  if (isTS || (!url.includes('.m3u8') && !url.includes('m3u8'))) {
    vid.src = url;
    vid.load();
    vid.play().catch(()=>{});
  } else if (Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 30 });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('spinner').classList.remove('on');
      vid.play().catch(()=>{});
    });
    hlsInst.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showError('HLS error: ' + data.details);
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = url;
    vid.load();
    vid.play().catch(()=>{});
  } else {
    showError('এই ব্রাউজারে HLS সাপোর্ট নেই');
  }

  vid.onwaiting  = () => document.getElementById('spinner').classList.add('on');
  vid.onplaying  = () => document.getElementById('spinner').classList.remove('on');
  vid.oncanplay  = () => document.getElementById('spinner').classList.remove('on');
  vid.onerror    = () => showError('ভিডিও লোড করা যায়নি');
}

function showError(msg) {
  document.getElementById('spinner').classList.remove('on');
  document.getElementById('errMsg').textContent = msg || 'অজানা সমস্যা';
  document.getElementById('errOverlay').classList.add('on');
}

function retryNext() {
  if (!activeChannel) return;
  const next = (urlIndex + 1) % activeChannel.urls.length;
  play(activeChannel, next);
}

function retryCurrent() {
  if (!activeChannel) return;
  play(activeChannel, urlIndex);
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value;
  if (q && activeGroup !== 'সব') {
    activeGroup = 'সব';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  }
  renderList(q);
});

// ─── MOBILE MENU ─────────────────────────────────────────────────────────────
document.getElementById('menuBtn').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!activeChannel) return;
  const all = allChannels.filter(c => activeGroup === 'সব' || c.group === activeGroup);
  const idx = all.indexOf(activeChannel);
  if (e.key === 'ArrowDown' && idx < all.length - 1) play(all[idx+1]);
  if (e.key === 'ArrowUp' && idx > 0) play(all[idx-1]);
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
